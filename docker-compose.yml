services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: rocktom-database
    environment:
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: rocktom
    volumes:
      - ${DATABASE_STORAGE_PATH:?DATABASE_STORAGE_PATH is required}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:?DATABASE_USER is required} -d rocktom"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${DATABASE_PORT:?DATABASE_PORT is required}:5432"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: rocktom-api
    environment:
      PORT: 3000
      CORS_ORIGIN: ${APP_URL:?APP_URL is required}
      JWT_SECRET: ${API_JWT_SECRET:?API_JWT_SECRET is required}
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: ${DATABASE_USER:?DATABASE_USER is required}
      DB_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      DB_NAME: rocktom
      MAILER_MODE: ${API_MAILER_MODE:-local}
      MAILER_FROM: ${API_MAILER_FROM:-Rocktom <noreply@localhost>}
      MAILER_HOST: ${API_MAILER_HOST:-}
      MAILER_PORT: ${API_MAILER_PORT:-}
      MAILER_USER: ${API_MAILER_USER:-}
      MAILER_PASS: ${API_MAILER_PASS:-}
      MAILER_SECURE: ${API_MAILER_SECURE:-false}
      STORAGE_PATH: /app/storage
    volumes:
      - ${API_STORAGE_PATH:?API_STORAGE_PATH is required}:/api/storage
    ports:
      - "${API_PORT:?API_PORT is required}:3000"
    depends_on:
      database:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL:?API_URL is required}
    container_name: rocktom-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:?APP_PORT is required}:80"
    depends_on:
      - api

volumes:
  postgres_data:
  api_storage:
